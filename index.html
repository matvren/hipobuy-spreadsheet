<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive / Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #ffffff; 
            color: #000000;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom UI Components */
        .search-input {
            border: none;
            border-bottom: 2px solid #000000;
            border-radius: 0;
            transition: all 0.2s ease;
        }

        /* Custom Dropdown Styling */
        .custom-select-container {
            position: relative;
            min-width: 200px;
        }

        #dropdownToggle {
            border-bottom: 2px solid #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 8px 0;
            font-size: 0.875rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        #dropdownMenu {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: white;
            border: 1px solid #000;
            z-index: 100;
            display: none;
            margin-top: -1px; /* Overlap the bottom border */
        }

        .dropdown-item {
            padding: 10px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover { background: #000; color: #fff; }

        .img-box {
            background-color: #fcfcfc;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #f0f0f0;
        }

        .img-box img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        .show { display: block !important; }
    </style>
</head>
<body class="p-6 md:p-12">

    <nav class="max-w-7xl mx-auto mb-24">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-10">
            <div>
                <h1 class="text-5xl font-bold tracking-tighter uppercase mb-2">Inventory.01</h1>
                <p class="text-[10px] font-medium opacity-40 uppercase tracking-[0.3em]">HipoBuy / Automatic Archive System</p>
            </div>

            <div class="flex flex-col sm:flex-row gap-8 w-full md:w-auto items-start sm:items-end">
                <div class="w-full sm:w-64">
                    <input type="text" id="searchInput" placeholder="SEARCH_DB" 
                        class="search-input bg-transparent py-2 w-full text-sm font-bold focus:outline-none placeholder:text-gray-300">
                </div>
                
                <div class="custom-select-container">
                    <div id="dropdownToggle">
                        <span id="selectedCategory">ALL_CATEGORIES</span>
                        <i class="fas fa-chevron-down text-[10px] ml-4"></i>
                    </div>
                    <div id="dropdownMenu">
                        <div class="dropdown-item" data-value="all">ALL_CATEGORIES</div>
                        </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto">
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-10 gap-y-20"></div>
        <div id="noResults" class="hidden pt-10 border-t border-black uppercase text-xs font-bold tracking-widest">
            Null response for current filter.
        </div>
    </main>

    <script>
        let allData = [];
        let currentCategory = 'all';

        const toggle = document.getElementById('dropdownToggle');
        const menu = document.getElementById('dropdownMenu');
        const selectedText = document.getElementById('selectedCategory');

        // Toggle dropdown visibility
        toggle.addEventListener('click', () => menu.classList.toggle('show'));

        // Close dropdown when clicking outside
        window.addEventListener('click', (e) => {
            if (!toggle.contains(e.target)) menu.classList.remove('show');
        });

        async function init() {
            try {
                const r = await fetch('products.json?v=' + Date.now());
                allData = await r.json();
                
                // Populate custom dropdown
                const categories = [...new Set(allData.map(p => p.category))].filter(c => c);
                categories.forEach(cat => {
                    const div = document.createElement('div');
                    div.className = 'dropdown-item';
                    div.innerText = cat.toUpperCase();
                    div.setAttribute('data-value', cat);
                    div.onclick = () => selectCategory(cat);
                    menu.appendChild(div);
                });

                render(allData);
            } catch (e) { console.error(e); }
        }

        function selectCategory(val) {
            currentCategory = val;
            selectedText.innerText = val === 'all' ? 'ALL_CATEGORIES' : val.toUpperCase();
            menu.classList.remove('show');
            handleFilter();
        }

        function render(data) {
            const grid = document.getElementById('productGrid');
            const empty = document.getElementById('noResults');
            
            if (data.length === 0) {
                grid.innerHTML = "";
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.innerHTML = data.map(item => `
                <div class="group cursor-pointer">
                    <a href="${item.url}" target="_blank">
                        <div class="img-box mb-6 border border-transparent group-hover:border-black transition-all">
                            <img src="${item.image}" alt="${item.name}">
                        </div>
                        <div class="flex justify-between items-start">
                            <div class="max-w-[70%]">
                                <p class="text-[9px] font-bold opacity-30 uppercase tracking-[0.2em] mb-1">${item.category || 'General'}</p>
                                <h3 class="text-xs font-bold leading-tight uppercase tracking-tight line-clamp-2">${item.name}</h3>
                            </div>
                            <span class="text-base font-bold tracking-tighter">${item.price}</span>
                        </div>
                    </a>
                </div>
            `).join('');
        }

        function handleFilter() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(query);
                const matchesCat = currentCategory === 'all' || p.category === currentCategory;
                return matchesSearch && matchesCat;
            });
            render(filtered);
        }

        document.getElementById('searchInput').oninput = handleFilter;
        document.getElementById('dropdownMenu').children[0].onclick = () => selectCategory('all');
        
        window.onload = init;
    </script>
    <script src="https://kit.fontawesome.com/your-font-awesome-key.js" crossorigin="anonymous"></script>
</body>
</html>
