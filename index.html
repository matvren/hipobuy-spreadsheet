<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HipoBuy Spreadsheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .product-card:hover img { transform: scale(1.05); }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="glass-nav sticky top-0 z-50 border-b border-slate-200 px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i class="fas fa-layer-group text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">HipoBuy <span class="text-blue-600">Catalog</span></h1>
            </div>
            
            <div class="relative w-full md:w-96">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="Search products, categories..." 
                    class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition shadow-sm">
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <p id="itemCount" class="text-sm font-medium text-slate-500 uppercase tracking-wider">Loading items...</p>
            <div class="flex gap-2">
                <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold">LIVE UPDATES</span>
            </div>
        </div>

        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>

        <div id="noResults" class="hidden text-center py-20">
            <i class="fas fa-search text-4xl text-slate-300 mb-4"></i>
            <p class="text-slate-500">No products match your search.</p>
        </div>
    </main>

    <script>
        let allProducts = [];

        async function fetchProducts() {
            try {
                // Fetching from the same directory on GitHub
                const response = await fetch('products.json?t=' + new Date().getTime());
                allProducts = await response.json();
                renderProducts(allProducts);
            } catch (error) {
                console.error("Error loading products:", error);
                document.getElementById('productGrid').innerHTML = `
                    <div class="col-span-full text-center p-10 bg-white rounded-2xl border border-red-100">
                        <p class="text-red-500 font-medium">Failed to load products.json. Make sure it exists in your repo!</p>
                    </div>`;
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            const countLabel = document.getElementById('itemCount');
            const noResults = document.getElementById('noResults');

            countLabel.innerText = `${products.length} Products Found`;
            
            if (products.length === 0) {
                grid.innerHTML = "";
                noResults.classList.remove('hidden');
                return;
            }

            noResults.classList.add('hidden');
            grid.innerHTML = products.map(item => `
                <div class="product-card bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col">
                    <div class="relative aspect-square overflow-hidden bg-slate-100">
                        <img src="${item.image}" alt="${item.name}" class="w-full h-full object-contain transition-transform duration-500 p-4">
                        <div class="absolute top-3 left-3">
                            <span class="bg-white/90 backdrop-blur px-2 py-1 rounded-md text-[10px] font-bold uppercase tracking-widest border border-slate-200 shadow-sm">${item.category}</span>
                        </div>
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <h3 class="font-bold text-slate-800 text-lg mb-1 leading-snug h-12 overflow-hidden line-clamp-2">${item.name}</h3>
                        <div class="mt-auto pt-4 flex justify-between items-center">
                            <span class="text-2xl font-black text-blue-600">${item.price}</span>
                            <a href="${item.url}" target="_blank" class="bg-slate-900 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-blue-600 transition-colors">
                                <i class="fas fa-external-link-alt text-sm"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Search logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.category.toLowerCase().includes(term)
            );
            renderProducts(filtered);
        });

        window.onload = fetchProducts;
    </script>
</body>
</html>
